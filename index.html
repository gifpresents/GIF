<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>

  <!-- ============================================= -->
  <!-- 1. INSTAGRAM DM PREVIEW CONFIGURATION (OG TAGS) -->
  <!-- ============================================= -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gorana Independent Films | Cinematic Portfolio">
  <meta property="og:description" content="Welcome to GIF. Unlock the full-fidelity vertical theater experience.">
  <meta property="og:url" content="https://home.gifpresents.com">
  <!-- Replace the image link below with a direct URL to a high-res JPG/PNG poster frame or logo for the chat preview -->
  <meta property="og:image" content="https://www.gifpresents.com/favicon.ico">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    @font-face {
      font-family: 'Kyok Light';
      src: local('Kyok Light'), local('Kyok-Light');
    }
    @font-face {
      font-family: 'Kyok Medium';
      src: local('Kyok Medium'), local('Kyok-Medium');
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: "Kyok Light", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      z-index: 99999;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .brand-logo-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 1px solid #2d2d2d;
      background-color: #000;
    }

    h2 {
      color: #ffb300;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    p {
      font-family: "Kyok Light", -apple-system, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 28px 0;
    }

    .button-group {
      width: 85%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chrome-button {
      display: block;
      width: 100%;
      background-color: #ffb300;
      color: #121212;
      border: none;
      padding: 14px 24px;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background-color 0.2s ease;
      box-shadow: 0 4px 15px rgba(255, 179, 0, 0.2);
      box-sizing: border-box;
      text-decoration: none;
    }

    .chrome-button:active {
      background-color: #ffa000;
    }

    .safari-button {
      display: block;
      width: 100%;
      background-color: transparent;
      color: #ffffff;
      border: 1px solid #333333;
      padding: 13px 24px;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      box-sizing: border-box;
      text-decoration: none;
    }

    .safari-button:active {
      border-color: #ffb300;
      color: #ffb300;
    }

    /* ============================================= -->
    /* BRAND STRENGTH OVERLAY LAYER (THE CINEMATIC ESCAPE) */
    /* ============================================= --> */
    .theater-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(18, 18, 18, 0.95);
      z-index: 999999;
      color: #ffffff;
      box-sizing: border-box;
      padding: 32px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .theater-msg h3 {
      font-family: "Kyok Medium", sans-serif;
      color: #ffb300;
      font-size: 1.4rem;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .theater-msg p {
      font-family: "Kyok Light", sans-serif;
      font-size: 0.9rem;
      color: #cccccc;
      max-width: 280px;
      margin: 0 auto;
    }

    /* Visual Dynamic Pointer Indication Guide Arrow */
    .indicator-arrow {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 2rem;
      color: #ffb300;
      animation: pointUp 1.2s ease-in-out infinite alternate;
    }

    @keyframes pointUp {
      0% { transform: translateY(0) scale(1); opacity: 0.4; }
      100% { transform: translateY(-12px) scale(1.1); opacity: 1; }
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader-view">
    <div class="spinner"></div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <img src="logo.gif" class="brand-logo-img" alt="GIF Animated Logo">
      <h2>Welcome to GIF</h2>
      <p>We would look best in your native browser</p>
      
      <div class="button-group">
        <a href="googlechromes://www.gifpresents.com" class="chrome-button">Quick Launch (Chrome)</a>
        <button class="safari-button" onclick="activateTheaterMode()">Cinematic Mode (Safari)</button>
      </div>
    </div>
  </div>

  <!-- High-End Luxury Overlay Interface Frame -->
  <div id="theater-view" class="theater-overlay">
    <!-- Visual cue guiding them cleanly right to Instagram's framework anchor -->
    <div class="indicator-arrow">↗</div>
    
    <div class="theater-msg">
      <h3>Activating Theatre Mode</h3>
      <p>To experience our vertical series in uncompressed, high-fidelity resolution, tap the options menu above and choose <b>Open in Safari</b>.</p>
    </div>
  </div>

  <script>
    function activateTheaterMode() {
      // Toggle the cinematic black overlay frame seamlessly
      document.getElementById("theater-view").style.display = "flex";
    }

    (function manageBridgeRouting() {
      var targetDestinationUrl = "https://www.gifpresents.com";
      var isPreviewMode = window.location.search.indexOf("preview=true") > -1;

      if (isPreviewMode) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
        return; 
      }

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
