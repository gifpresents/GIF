<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gorana Independent Films</title>

  <!-- ============================================= -->
  <!-- INSTAGRAM DM LINK PREVIEW CARD CONFIGURATION -->
  <!-- ============================================= -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gorana Independent Films">
  <meta property="og:description" content="Welcome to GIF">
  <meta property="og:url" content="https://home.gifpresents.com">
  <meta property="og:image" content="preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    @font-face {
      font-family: 'Kyok Light';
      src: local('Kyok Light'), local('Kyok-Light');
    }
    @font-face {
      font-family: 'Kyok Medium';
      src: local('Kyok Medium'), local('Kyok-Medium');
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: "Kyok Light", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #in-app-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      z-index: 99999;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .instruction-card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 40px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-logo-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      margin-bottom: 24px;
      border-radius: 50%;
      border: 1px solid #2d2d2d;
      background-color: #000;
    }

    h2 {
      color: #ffb300;
      font-family: "Kyok Medium", -apple-system, sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0 0 14px 0;
      letter-spacing: 0.5px;
    }

    p {
      font-family: "Kyok Light", -apple-system, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #a0a0a0;
      margin: 0 0 32px 0;
    }

    /* Fixed Bottom Alignment Grid Container Setup */
    .icon-button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 85%;
      margin-top: 8px;
    }

    .monochrome-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end; /* Locks elements directly to the baseline */
      height: 96px;
      background: #1c1c1c;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      box-sizing: border-box;
      padding: 16px 8px;
      transition: all 0.2s ease;
    }

    .monochrome-btn img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      filter: grayscale(100%) brightness(70%);
      transition: filter 0.2s ease;
      margin-bottom: auto; /* Pushes the image container up cleanly */
    }

    .monochrome-btn span {
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.7rem;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      line-height: 1;
    }

    .monochrome-btn:active {
      border-color: #ffb300;
      background: #222222;
    }
    
    .monochrome-btn:active img {
      filter: grayscale(0%) brightness(100%);
    }

    .monochrome-btn:active span {
      color: #ffb300;
    }

    /* Minimal Bold Full-Screen Graphics Frame Overlay Layer */
    .guide-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0c0c0c;
      z-index: 999999;
      box-sizing: border-box;
      padding: 40px 24px;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    /* Dynamic Multi-Scale Graphic Directional Arrays */
    .heavy-graphic-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding-right: 12px;
      margin-top: -10px;
    }

    .arrow-heavy-primary {
      font-size: 6.5rem;
      font-weight: 900;
      color: #ffb300;
      line-height: 0.8;
      margin: 0;
      animation: shiftUp 0.6s ease-in-out infinite alternate;
    }

    .arrow-heavy-secondary {
      font-size: 3.5rem;
      font-weight: 900;
      color: rgba(255, 179, 0, 0.3);
      line-height: 0.8;
      margin: -10px 16px 0 0;
      animation: shiftUp 0.6s ease-in-out infinite alternate 0.15s;
    }

    @keyframes shiftUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-14px); }
    }

    .center-artistic-block {
      text-align: center;
      width: 100%;
    }

    .industrial-cross-frame {
      display: inline-block;
      border-left: 2px solid #222;
      border-right: 2px solid #222;
      padding: 0 40px;
      margin-bottom: 24px;
    }

    .glyph-display-cluster {
      font-size: 6rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .action-header-text {
      font-family: "Kyok Medium", sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 2px;
      margin: 0 0 6px 0;
      text-transform: uppercase;
    }

    .action-sub-text {
      font-family: "Kyok Light", sans-serif;
      font-size: 0.95rem;
      color: #ffb300;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #333333;
      color: #555555;
      padding: 14px 44px;
      font-family: "Kyok Medium", sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }

    .back-btn:active {
      border-color: #ffffff;
      color: #ffffff;
      background: rgba(255,255,255,0.03);
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,179,0,0.1);
      border-top: 3px solid #ffb300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader-view">
    <div class="spinner"></div>
  </div>

  <div id="in-app-banner">
    <div class="instruction-card">
      <img src="logo.gif" class="brand-logo-img" alt="GIF Animated Logo">
      <h2>Welcome to GIF</h2>
      <p>If you wear trousers, give us a browser!</p>
      
      <div class="icon-button-grid">
        <a href="googlechromes://www.gifpresents.com" class="monochrome-btn">
          <img src="chrome-icon.png" alt="Chrome">
          <span>Chrome</span>
        </a>

        <button class="monochrome-btn" onclick="toggleOverlay(true)">
          <img src="safari-icon.png" alt="Safari">
          <span>Safari</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Heavy Graphical Minimalist Target Breakout Overlay -->
  <div id="guide-overlay-view" class="guide-overlay">
    
    <!-- Heavy Directional Upward Cascade Elements Frame -->
    <div class="heavy-graphic-wrapper">
      <div class="arrow-heavy-primary">↑</div>
      <div class="arrow-heavy-secondary">↑</div>
    </div>
    
    <!-- Central Modern Creative Geometric Text Block Node -->
    <div class="center-artistic-block">
      <div class="industrial-cross-frame">
        <div class="glyph-display-cluster">···</div>
      </div>
      <h4 class="action-header-text">TAP THE MENU ABOVE</h4>
      <p class="action-sub-text">OPEN IN BROWSER</p>
    </div>

    <button class="back-btn" onclick="toggleOverlay(false)">Back</button>
  </div>

  <script>
    function toggleOverlay(show) {
      document.getElementById("guide-overlay-view").style.display = show ? "flex" : "none";
    }

    (function manageBridgeRouting() {
      var targetDestinationUrl = "https://www.gifpresents.com";
      var isPreviewMode = window.location.search.indexOf("preview=true") > -1;

      if (isPreviewMode) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
        return; 
      }

      var ua = (navigator.userAgent || navigator.vendor || "").toLowerCase();
      var isIOS = /ipad|iphone|ipod/.test(navigator.platform.toLowerCase()) || 
                  (/macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
                  
      var isInAppBrowser = (ua.indexOf("fban") > -1) || 
                           (ua.indexOf("fbav") > -1) || 
                           (ua.indexOf("instagram") > -1) ||
                           (window.webkit && window.webkit.messageHandlers);

      if (isIOS && isInAppBrowser) {
        document.getElementById("loader-view").style.display = "none";
        document.getElementById("in-app-banner").style.display = "flex";
      } else {
        window.location.replace(targetDestinationUrl);
      }
    })();
  </script>
</body>
</html>
